<!-- Cloud Sync Module - Persists ALL admin settings across any browser/device -->
<script>
window.SITE_URL = 'https://remedybloomy.xo.je/';

// ===== CLOUD SYNC =====
// Uses JSONBin.io (free, no account needed for public bins).
// HARDCODED_BIN_ID: once set, every browser opening this file reads/writes the SAME bin.
// The admin sets this once via Settings → "Activate Cloud Sync" and it persists forever.
window.CloudSync = (function() {
  const LS_KEY     = 'rb_cloud_bin_id';
  const API        = 'https://api.jsonbin.io/v3';
  // ▼▼▼ This gets set permanently once you activate cloud sync from Admin → Settings ▼▼▼
  const HARDCODED  = null; // e.g. '6856a1234abc...' after first activation

  // Priority: hardcoded (baked into file) → URL ?bin= param → localStorage
  function _fromUrl() {
    try { return new URLSearchParams(window.location.search).get('bin') || null; } catch(e){ return null; }
  }
  let binId = HARDCODED || _fromUrl() || localStorage.getItem(LS_KEY) || null;
  if (binId) localStorage.setItem(LS_KEY, binId);

  async function _req(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Bin-Private': 'false' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    if (!r.ok) throw new Error('CloudSync HTTP ' + r.status);
    return r.json();
  }

  async function load() {
    if (!binId) return null;
    try {
      const d = await _req('GET', '/b/' + binId + '/latest');
      return d.record || null;
    } catch(e) { return null; }
  }

  async function save(data) {
    try {
      if (!binId) {
        const d = await _req('POST', '/b', data);
        binId = d.metadata.id;
        localStorage.setItem(LS_KEY, binId);
      } else {
        await _req('PUT', '/b/' + binId, data);
      }
      return true;
    } catch(e) { return false; }
  }

  function getBinId()   { return binId; }
  function isHardcoded(){ return !!HARDCODED; }

  function getShareUrl() {
    if (!binId) return null;
    try {
      const u = new URL(window.SITE_URL);
      u.searchParams.set('bin', binId);
      return u.toString();
    } catch(e) { return window.SITE_URL + '?bin=' + binId; }
  }

  return { load, save, getBinId, isHardcoded, getShareUrl };
})();
</script>
<script>
// Pre-React: store hash so React can read it reliably after mount
window._initHash = window.location.hash;
// Clean ?bin= from the visible browser URL (it's already in localStorage; no need to show it)
try {
  const _u = new URL(window.location.href);
  if (_u.searchParams.has('bin')) {
    _u.searchParams.delete('bin');
    window.history.replaceState(null, '', _u.toString());
  }
} catch(_) {}
// Pre-React: detect unsubscribe token in URL (?unsubscribe=email or ?unsub=token)
window._unsubEmail = (function(){
  try {
    const p = new URLSearchParams(window.location.search);
    const e = p.get('unsubscribe') || p.get('unsub') || '';
    // tokens are base64-encoded emails
    if (!e) return '';
    try { return atob(e); } catch(_){ return e; }
  } catch(_){ return ''; }
})();
</script>

// ===== UTILITIES =====
function extractVideo(url) {
  if (!url) return null;
  // YouTube: use youtube-nocookie.com to avoid Error 153 (player config restriction)
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return {
    type:'youtube',
    videoId: yt[1],
    embedUrl:`https://www.youtube-nocookie.com/embed/${yt[1]}?rel=0&modestbranding=1&enablejsapi=1`,
    watchUrl:`https://www.youtube.com/watch?v=${yt[1]}`,
    thumb:`https://img.youtube.com/vi/${yt[1]}/hqdefault.jpg`
  };
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if (vi) return {type:'vimeo',embedUrl:`https://player.vimeo.com/video/${vi[1]}?dnt=1`,watchUrl:`https://vimeo.com/${vi[1]}`,thumb:null};
  if (/\.(mp4|webm|ogg)$/i.test(url)) return {type:'direct',src:url,thumb:null};
  return null;
}

function formatDate(d) {
  try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e){return d;}

// ===== ICON =====
const Icon = ({name,style={},className=''}) => {

// ===== APP =====
function App() {
  const [products,setProducts] = React.useState([]);
  const [categories,setCategories] = React.useState(initCategories);
  const [blogs,setBlogs] = React.useState([]);
  const [videos,setVideos] = React.useState([]);
  const [testimonials,setTestimonials] = React.useState([]);
  const [subscribers,setSubscribers] = React.useState([]);
  const [settings,setSettings] = React.useState(defaultSettings);

  const [cart,setCart] = React.useState([]);
  const [favorites,setFavorites] = React.useState([]);
  const [selectedCategory,setSelectedCategory] = React.useState('All');
  const [searchQuery,setSearchQuery] = React.useState('');

  const [isAdmin,setIsAdmin] = React.useState(false);
  const [showAdminLogin,setShowAdminLogin] = React.useState(false);
  const [showCart,setShowCart] = React.useState(false);
  const [showMenu,setShowMenu] = React.useState(false);
  const [editingProduct,setEditingProduct] = React.useState(null);
  const [showProductForm,setShowProductForm] = React.useState(false);
  const [readingBlog,setReadingBlog] = React.useState(null);
  const [viewingProduct,setViewingProduct] = React.useState(null);
  const [playingVideo,setPlayingVideo] = React.useState(null);
  const [activeView,setActiveView] = React.useState('shop');
  const [toast,setToast] = React.useState('');
  const [logoClicks,setLogoClicks] = React.useState(0);

  // Load: localStorage first (instant), then cloud override (cross-browser persistence)
  React.useEffect(()=>{
    const ls = (k,fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch(e){return fb;} };
    setProducts(ls('rb_products',initProducts));
    setCategories(ls('rb_categories',initCategories));
    setBlogs(ls('rb_blogs',initBlogs));
    setVideos(ls('rb_videos',initVideos));
    setTestimonials(ls('rb_testimonials',initTestimonials));
    setSubscribers(ls('rb_subscribers',[]));
    const lsSet = ls('rb_settings',{});
    setSettings(()=>({...defaultSettings,...lsSet,social:{...defaultSettings.social,...(lsSet.social||{})},contact:{...defaultSettings.contact,...(lsSet.contact||{})},chat:{...defaultSettings.chat,...(lsSet.chat||{})},newsletter:{...defaultSettings.newsletter,...(lsSet.newsletter||{})},apiKeys:{...defaultSettings.apiKeys,...(lsSet.apiKeys||{})}}));
    setCart(ls('rb_cart',[]));
    setFavorites(ls('rb_favorites',[]));
    // Pull cloud data and override with persisted admin changes
    window.CloudSync.load().then(cloud=>{
      if(!cloud) return;
      if(cloud.products&&cloud.products.length){setProducts(cloud.products);localStorage.setItem('rb_products',JSON.stringify(cloud.products));}
      if(cloud.categories&&cloud.categories.length){setCategories(cloud.categories);localStorage.setItem('rb_categories',JSON.stringify(cloud.categories));}
      if(cloud.blogs){setBlogs(cloud.blogs);localStorage.setItem('rb_blogs',JSON.stringify(cloud.blogs));}
      if(cloud.videos){setVideos(cloud.videos);localStorage.setItem('rb_videos',JSON.stringify(cloud.videos));}
      if(cloud.testimonials){setTestimonials(cloud.testimonials);localStorage.setItem('rb_testimonials',JSON.stringify(cloud.testimonials));}
      if(cloud.subscribers){setSubscribers(cloud.subscribers);localStorage.setItem('rb_subscribers',JSON.stringify(cloud.subscribers));}
      if(cloud.settings){
        const cs=cloud.settings;
        const merged={...defaultSettings,...cs,social:{...defaultSettings.social,...(cs.social||{})},contact:{...defaultSettings.contact,...(cs.contact||{})},chat:{...defaultSettings.chat,...(cs.chat||{})},newsletter:{...defaultSettings.newsletter,...(cs.newsletter||{})},apiKeys:{...defaultSettings.apiKeys,...(cs.apiKeys||{})}};
        setSettings(merged);localStorage.setItem('rb_settings',JSON.stringify(merged));
      }
    }).catch(()=>{});
    // Handle one-click unsubscribe from email link (?unsubscribe=base64email)
    const unsubTarget = window._unsubEmail || '';
    if (unsubTarget) {
      window._unsubEmail = ''; // clear so it doesn't run again
      // We need to wait for subscribers to load first, so store it and handle in a ref
      window._pendingUnsub = unsubTarget;
    }
  },[]);

  // Process pending one-click unsubscribe once subscribers are loaded from cloud
  React.useEffect(()=>{
    const target = window._pendingUnsub;
    if (!target || !subscribers.length) return;
    window._pendingUnsub = '';
    const found = subscribers.find(s => s.email.toLowerCase() === target.toLowerCase());
    if (found) {
      unsubscribe(target);
      setActiveView('shop');
      // Clean ?unsubscribe= from URL (leave other params intact)
      try {
        const u = new URL(window.location.href);
        u.searchParams.delete('unsubscribe');
        u.searchParams.delete('unsub');
        // Also remove ?bin= for clean display (it's stored in localStorage)
        u.searchParams.delete('bin');
        window.history.replaceState(null, '', u.toString());
      } catch(_){}
      setTimeout(()=>showToast('✅ You have been unsubscribed successfully.'), 500);
    }
  },[subscribers]);

  // ── Refs to always-current state (avoids stale closure in pushCloud) ──
  const stateRef = React.useRef({});
  stateRef.current = {products,categories,blogs,videos,testimonials,subscribers,settings};

  // Save to localStorage on every change (instant restore on same browser)
  React.useEffect(()=>{ if(products.length) localStorage.setItem('rb_products',JSON.stringify(products)); },[products]);
  React.useEffect(()=>{ localStorage.setItem('rb_categories',JSON.stringify(categories)); },[categories]);
  React.useEffect(()=>{ localStorage.setItem('rb_blogs',JSON.stringify(blogs)); },[blogs]);
  React.useEffect(()=>{ localStorage.setItem('rb_videos',JSON.stringify(videos)); },[videos]);
  React.useEffect(()=>{ localStorage.setItem('rb_testimonials',JSON.stringify(testimonials)); },[testimonials]);
  React.useEffect(()=>{ localStorage.setItem('rb_subscribers',JSON.stringify(subscribers)); },[subscribers]);
  React.useEffect(()=>{ localStorage.setItem('rb_settings',JSON.stringify(settings)); },[settings]);
  React.useEffect(()=>{ localStorage.setItem('rb_cart',JSON.stringify(cart)); },[cart]);
  React.useEffect(()=>{ localStorage.setItem('rb_favorites',JSON.stringify(favorites)); },[favorites]);

  // pushCloud: called explicitly by admin Save buttons → always uses latest state via ref
  const cloudTimerRef = React.useRef(null);
  const pushCloud = React.useCallback((overrideSettings)=>{
    if(cloudTimerRef.current) clearTimeout(cloudTimerRef.current);
    cloudTimerRef.current = setTimeout(()=>{
      const s = stateRef.current;
      const snap = {
        products: s.products,
        categories: s.categories,
        blogs: s.blogs,
        videos: s.videos,
        testimonials: s.testimonials,
        subscribers: s.subscribers,
        settings: overrideSettings || s.settings
      };
      window.CloudSync.save(snap).catch(()=>{});
    }, 400); // short debounce so rapid saves coalesce
  },[]);

  // Secret admin via URL hash
  React.useEffect(()=>{
    const isAdminHash = (h) => h === '#admin' || h === '#/admin';
    const check = () => {
      if(isAdminHash(window.location.hash) && !isAdmin) {
        setShowAdminLogin(true);
      }
    };
    // Check both the live hash and the pre-React captured hash (handles direct URL load)
    if((isAdminHash(window.location.hash) || isAdminHash(window._initHash||'')) && !isAdmin) {
      setShowAdminLogin(true);
      window._initHash = ''; // clear so it doesn't retrigger
    }
    window.addEventListener('hashchange', check);
    return ()=>window.removeEventListener('hashchange',check);
  },[isAdmin]);

  // Logo triple-click secret
  const handleLogoClick = () => {
    const n = logoClicks+1;
    setLogoClicks(n);
    if(n>=3){setLogoClicks(0);if(!isAdmin)setShowAdminLogin(true);}
    setTimeout(()=>setLogoClicks(0),1500);
  };

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),2800); };

  const fp = (usd) => settings.currency==='KES'
    ? `KES ${Math.round(usd*USD_TO_KES).toLocaleString()}`
    : `$${parseFloat(usd).toFixed(2)}`;
  const fpAlt = (usd) => settings.currency==='KES'
    ? `$${parseFloat(usd).toFixed(2)}`
    : `KES ${Math.round(usd*USD_TO_KES).toLocaleString()}`;

  const allCats = ['All',...categories];
  const filtered = products.filter(p=>{
    const mc = selectedCategory==='All'||p.category===selectedCategory;
    const ms = p.name.toLowerCase().includes(searchQuery.toLowerCase())||p.description.toLowerCase().includes(searchQuery.toLowerCase());
    return mc&&ms;
  });
  const featured = products.filter(p=>p.featured);
  const cartTotal = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const cartCount = cart.reduce((s,i)=>s+i.quantity,0);

  const addToCart = (p) => {
    const ex=cart.find(i=>i.id===p.id);
    if(ex) setCart(cart.map(i=>i.id===p.id?{...i,quantity:i.quantity+1}:i));
    else setCart([...cart,{...p,quantity:1}]);
    showToast(`${p.name} added to cart`);
  };
  const removeFromCart = id => setCart(cart.filter(i=>i.id!==id));
  const updateQty = (id,d) => setCart(cart.map(i=>i.id===id?{...i,quantity:i.quantity+d}:i).filter(i=>i.quantity>0));
  const toggleFav = id => setFavorites(favorites.includes(id)?favorites.filter(f=>f!==id):[...favorites,id]);

  const saveProduct = d => {
    if(editingProduct) setProducts(products.map(p=>p.id===editingProduct.id?{...d,id:p.id}:p));
    else setProducts([...products,{...d,id:Date.now()}]);
    setShowProductForm(false); setEditingProduct(null);
    showToast(editingProduct?'Product updated':'Product added');
    pushCloud();
  };
  const deleteProduct = id => { if(window.confirm('Delete this product?')){ setProducts(products.filter(p=>p.id!==id)); setCart(cart.filter(i=>i.id!==id)); showToast('Product deleted'); pushCloud(); }};

  const subscribe = email => {
    if(subscribers.find(s=>s.email===email)) return showToast('You are already subscribed!');
    setSubscribers(prev=>[...prev,{email,date:new Date().toISOString().split('T')[0]}]);
    showToast('Thank you for subscribing! 🌿');
    pushCloud();
  };

  const unsubscribe = email => {
    const trimmed = email.trim().toLowerCase();
    const found = subscribers.find(s=>s.email.toLowerCase()===trimmed);
    if(!found) return showToast('That email is not on our list.');
    setSubscribers(prev=>prev.filter(s=>s.email.toLowerCase()!==trimmed));
    showToast('You have been unsubscribed. Sorry to see you go 🌿');
    pushCloud();
  };

  const handleCheckout = () => {
    const link = settings.paymentLink.trim();
    if(link){ window.open(/^https?:\/\//.test(link)?link:'https://'+link,'_blank'); }
    else alert('Payment is being set up. Please contact us to complete your order.');
  };

  const adminLogin = pw => {
    if(pw===settings.adminPassword){ setIsAdmin(true); setShowAdminLogin(false); window.history.replaceState(null,'',window.location.pathname); showToast('Welcome to Admin Dashboard'); }
    else alert('Incorrect password. Please try again.');
  };

  return (
    <div>
      {/* HEADER */}
      <header>
        <div className="container">
          <div className="header-content">
            <div className="logo" onClick={handleLogoClick}>
              <Icon name="leaf" style={{width:'30px',height:'30px',color:'#059669'}}/>
              <h1 className="logo-text">RemedyBloomy</h1>
            </div>
            <nav style={{display:window.innerWidth>=768?'flex':'none'}}>
              <button onClick={()=>{setIsAdmin(false);setActiveView('shop');}} className={!isAdmin&&activeView==='shop'?'active':''}>Shop</button>
              <button onClick={()=>{setIsAdmin(false);setActiveView('blog');}} className={!isAdmin&&activeView==='blog'?'active':''}>Blog</button>
              <button onClick={()=>{setIsAdmin(false);setActiveView('videos');}} className={!isAdmin&&activeView==='videos'?'active':''}>Videos</button>
              <button onClick={()=>{setIsAdmin(false);setActiveView('subscribe');}} className={!isAdmin&&activeView==='subscribe'?'active':''}>Subscribe</button>
              {isAdmin&&<button onClick={()=>setIsAdmin(true)} className="active" style={{color:'#d97706',background:'#fef3c7',padding:'.25rem .75rem',borderRadius:'9999px',fontSize:'.8rem'}}>⚙ Admin</button>}
            </nav>
            <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>

              <button onClick={()=>setShowCart(!showCart)} className="cart-button">
                <Icon name="shopping-cart" style={{width:'24px',height:'24px',color:'#047857'}}/>
                {cartCount>0&&<span className="cart-badge">{cartCount}</span>}
              </button>
              <button onClick={()=>setShowMenu(!showMenu)} className="cart-button" style={{display:window.innerWidth<768?'block':'none'}}>
                <Icon name="menu" style={{width:'24px',height:'24px',color:'#047857'}}/>
              </button>
            </div>
          </div>
        </div>
        {showMenu&&(
          <div style={{borderTop:'1px solid #d1fae5',background:'white',padding:'1rem'}}>
            {[['Shop','shop'],['Blog','blog'],['Videos','videos'],['Subscribe','subscribe']].map(([l,v])=>(
              <button key={v} onClick={()=>{setIsAdmin(false);setActiveView(v);setShowMenu(false);}}
                style={{display:'block',width:'100%',textAlign:'left',padding:'.5rem 1rem',borderRadius:'.5rem',background:!isAdmin&&activeView===v?'#f0fdf4':'white',border:'none',cursor:'pointer',marginBottom:'.25rem',fontWeight:'500'}}>
                {l}
              </button>
            ))}
            {isAdmin&&<button onClick={()=>{setShowMenu(false);}} style={{display:'block',width:'100%',textAlign:'left',padding:'.5rem 1rem',borderRadius:'.5rem',background:'#fef3c7',border:'none',cursor:'pointer',fontWeight:'500',color:'#92400e'}}>⚙ Admin Panel</button>}
          </div>
        )}
      </header>

      {/* CART */}
      {showCart&&(
        <div className="cart-overlay">
          <div className="cart-backdrop" onClick={()=>setShowCart(false)}/>
          <div className="cart-sidebar scrollbar-hide">
            <div className="cart-header">
              <h2 className="cart-title">Your Cart</h2>
              <button onClick={()=>setShowCart(false)} style={{background:'none',border:'none',padding:'.5rem',cursor:'pointer'}}><Icon name="x" style={{width:'24px',height:'24px'}}/></button>
            </div>
            <div className="cart-content">
              {cart.length===0?(
                <div style={{textAlign:'center',padding:'3rem 0'}}>
                  <Icon name="shopping-cart" style={{width:'56px',height:'56px',color:'#d1d5db',display:'block',margin:'0 auto 1rem'}}/>
                  <p style={{color:'#6b7280'}}>Your cart is empty</p>
                </div>
              ):(
                <>
                  {cart.map(item=>(
                    <div key={item.id} className="cart-item">
                      <img src={item.image} alt={item.name} className="cart-item-image"/>
                      <div className="cart-item-info">
                        <h3 className="cart-item-name">{item.name}</h3>
                        <p className="cart-item-price">{fp(item.price)} <span style={{fontWeight:'400',fontSize:'.8rem',color:'#9ca3af'}}>{fpAlt(item.price)}</span></p>
                        <div className="quantity-controls">
                          <button onClick={()=>updateQty(item.id,-1)} className="quantity-button">-</button>
                          <span className="quantity-display">{item.quantity}</span>
                          <button onClick={()=>updateQty(item.id,1)} className="quantity-button">+</button>
                        </div>
                      </div>
                      <button onClick={()=>removeFromCart(item.id)} className="remove-button"><Icon name="trash-2" style={{width:'18px',height:'18px'}}/></button>
                    </div>
                  ))}
                  <div className="cart-total">
                    <div className="cart-total-row">
                      <span className="cart-total-label">Total</span>
                      <div style={{textAlign:'right'}}>
                        <div className="cart-total-amount">{fp(cartTotal)}</div>
                        <div style={{fontSize:'.8rem',color:'#9ca3af',marginTop:'.1rem'}}>{fpAlt(cartTotal)}</div>
                      </div>
                    </div>
                    <button className="checkout-button" onClick={handleCheckout}>
                      <Icon name="credit-card" style={{width:'18px',height:'18px'}}/>
                      Proceed to Checkout
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ADMIN LOGIN MODAL */}
      {showAdminLogin&&<AdminLoginModal onLogin={adminLogin} onClose={()=>{setShowAdminLogin(false);window.history.replaceState(null,'',window.location.pathname);}}/>}

      {/* PRODUCT DETAIL MODAL */}
      {viewingProduct&&<ProductDetailModal product={viewingProduct} fp={fp} fpAlt={fpAlt} onAddToCart={addToCart} onToggleFav={toggleFav} isFav={favorites.includes(viewingProduct.id)} onClose={()=>setViewingProduct(null)}/>}

      {/* BLOG READ MODAL */}
      {readingBlog&&(
        <div className="modal-overlay">
          <div className="modal-backdrop" onClick={()=>setReadingBlog(null)}/>
          <div className="modal-content scrollbar-hide" style={{maxWidth:'52rem'}}>
            <div className="modal-header">
              <h2 className="modal-title" style={{flex:1,paddingRight:'1rem'}}>{readingBlog.title}</h2>
              <button onClick={()=>setReadingBlog(null)} style={{background:'none',border:'none',padding:'.5rem',cursor:'pointer'}}><Icon name="x" style={{width:'24px',height:'24px'}}/></button>
            </div>
            <div className="modal-body">
              {readingBlog.image&&<img src={readingBlog.image} alt={readingBlog.title} className="blog-full-image" onError={e=>e.target.style.display='none'}/>}
              <div style={{display:'flex',gap:'1.5rem',marginBottom:'1.5rem',color:'#6b7280',fontSize:'.875rem',flexWrap:'wrap'}}>
                <span style={{display:'flex',alignItems:'center',gap:'.375rem'}}><Icon name="calendar" style={{width:'14px',height:'14px'}}/>{formatDate(readingBlog.date)}</span>
                <span style={{display:'flex',alignItems:'center',gap:'.375rem'}}><Icon name="user" style={{width:'14px',height:'14px'}}/>{readingBlog.author}</span>
              </div>
              <p className="blog-full-content">{readingBlog.content}</p>
            </div>
          </div>
        </div>
      )}

      {/* VIDEO MODAL */}
      {playingVideo&&(
        <div className="modal-overlay">
          <div className="modal-backdrop" onClick={()=>setPlayingVideo(null)}/>
          <div className="modal-content video-modal-content scrollbar-hide">
            <div className="modal-header">
              <h2 className="modal-title" style={{flex:1,paddingRight:'1rem'}}>{playingVideo.title}</h2>
              <button onClick={()=>setPlayingVideo(null)} style={{background:'none',border:'none',padding:'.5rem',cursor:'pointer'}}><Icon name="x" style={{width:'24px',height:'24px'}}/></button>
            </div>
            <div className="modal-body">
              <VideoPlayer video={playingVideo}/>
              {playingVideo.description&&<p style={{color:'#6b7280',fontSize:'.9rem',marginTop:'1rem',lineHeight:'1.6'}}>{playingVideo.description}</p>}
            </div>
          </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <main className="container" style={{paddingTop:'2rem',paddingBottom:'2rem'}}>
        {isAdmin?(
          <AdminPanel
            products={products} categories={categories} blogs={blogs}
            videos={videos} testimonials={testimonials} subscribers={subscribers}
            settings={settings}
            onSettingsChange={(sectionOrObj,val)=>{
              const nested=['social','contact','chat','newsletter','apiKeys'];
              let updated;
              if(val===undefined){
                updated = {...stateRef.current.settings,...sectionOrObj,
                  social:{...(stateRef.current.settings.social||{}),...(sectionOrObj.social||{})},
                  contact:{...(stateRef.current.settings.contact||{}),...(sectionOrObj.contact||{})},
                  chat:{...(stateRef.current.settings.chat||{}),...(sectionOrObj.chat||{})},
                  newsletter:{...(stateRef.current.settings.newsletter||{}),...(sectionOrObj.newsletter||{})},
                  apiKeys:{...(stateRef.current.settings.apiKeys||{}),...(sectionOrObj.apiKeys||{})}
                };
              } else if(nested.includes(sectionOrObj)){
                updated = {...stateRef.current.settings,[sectionOrObj]:{...(stateRef.current.settings[sectionOrObj]||{}),...val}};
              } else {
                updated = {...stateRef.current.settings,[sectionOrObj]:val};
              }
              setSettings(updated);
              pushCloud(updated); // Push to cloud immediately with the new settings value
            }}
            onEditProduct={p=>{setEditingProduct(p);setShowProductForm(true);}}
            onAddProduct={()=>{setEditingProduct(null);setShowProductForm(true);}}
            onDeleteProduct={deleteProduct}
            onAddCategory={cat=>{if(!categories.includes(cat)){setCategories(prev=>{const n=[...prev,cat];return n;});pushCloud();}}}
            onDeleteCategory={cat=>{setCategories(prev=>{const n=prev.filter(c=>c!==cat);return n;});pushCloud();}}
            onSaveBlog={b=>{ if(b.id)setBlogs(blogs.map(x=>x.id===b.id?b:x)); else setBlogs([...blogs,{...b,id:Date.now()}]); showToast('Blog post saved'); pushCloud();}}
            onDeleteBlog={id=>{if(window.confirm('Delete this post?')){setBlogs(blogs.filter(b=>b.id!==id));showToast('Post deleted');pushCloud();}}}
            onSaveVideo={v=>{ if(v.id)setVideos(videos.map(x=>x.id===v.id?v:x)); else setVideos([...videos,{...v,id:Date.now()}]); showToast('Video saved'); pushCloud();}}
            onDeleteVideo={id=>{if(window.confirm('Delete this video?')){setVideos(videos.filter(v=>v.id!==id));showToast('Video deleted');pushCloud();}}}
            onSaveTestimonial={t=>{ if(t.id)setTestimonials(testimonials.map(x=>x.id===t.id?t:x)); else setTestimonials([...testimonials,{...t,id:Date.now()}]); showToast('Testimonial saved'); pushCloud();}}
            onDeleteTestimonial={id=>{if(window.confirm('Delete?')){setTestimonials(testimonials.filter(t=>t.id!==id));showToast('Deleted');pushCloud();}}}
            onClearSubscribers={()=>{if(window.confirm('Clear all subscribers?')){setSubscribers([]);pushCloud();}}}
            onExitAdmin={()=>setIsAdmin(false)}
            onLogout={()=>{ setIsAdmin(false); showToast('You have been logged out.'); }}
            showToast={showToast}
          />
        ):activeView==='blog'?(
          <BlogPage blogs={blogs} onReadMore={setReadingBlog}/>
        ):activeView==='videos'?(
          <VideosPage videos={videos} onPlay={setPlayingVideo}/>
        ):activeView==='subscribe'?(
          <SubscribePage settings={settings} onSubscribe={subscribe} onUnsubscribe={unsubscribe}/>
        ):(
          <ShopPage
            products={products} featured={featured} filtered={filtered}
            allCats={allCats} selectedCategory={selectedCategory} onCategoryChange={setSelectedCategory}
            searchQuery={searchQuery} onSearchChange={setSearchQuery}
            onAddToCart={addToCart} onToggleFav={toggleFav} favorites={favorites}
            fp={fp} fpAlt={fpAlt} onViewProduct={setViewingProduct}
            testimonials={testimonials} settings={settings} onSubscribe={subscribe} onUnsubscribe={unsubscribe}
          />
        )}
      </main>

      {/* FOOTER */}
      <Footer settings={settings} onSubscribe={subscribe} onUnsubscribe={unsubscribe}/>

      {/* PRODUCT FORM */}
      {showProductForm&&<ProductForm product={editingProduct} categories={categories} onSave={saveProduct} onCancel={()=>{setShowProductForm(false);setEditingProduct(null);}}/>}

      {/* LIVE CHAT */}
      {settings.chat.enabled&&<ChatWidget settings={settings}/>}

      {/* TOAST */}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

// ===== ADMIN LOGIN MODAL =====
function AdminLoginModal({onLogin,onClose}) {
  const [pw,setPw] = React.useState('');
  const [show,setShow] = React.useState(false);
  return (
    <div className="modal-overlay">
      <div className="modal-backdrop" onClick={onClose}/>
      <div className="modal-content admin-login-modal">
        <div className="modal-body" style={{padding:'2rem'}}>
          <div className="admin-login-logo">
            <Icon name="shield-check" style={{width:'48px',height:'48px',color:'#059669',display:'block',margin:'0 auto .75rem'}}/>
            <h2 className="font-display" style={{fontSize:'1.75rem',fontWeight:'700',color:'#064e3b',textAlign:'center'}}>Admin Access</h2>
            <p style={{color:'#6b7280',fontSize:'.875rem',textAlign:'center',marginTop:'.25rem'}}>Enter your admin password to continue</p>
          </div>
          <div className="form-group" style={{position:'relative'}}>
            <label className="form-label">Password</label>
            <input type={show?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} className="form-input" placeholder="Enter admin password" onKeyDown={e=>e.key==='Enter'&&onLogin(pw)} autoFocus/>
            <button onClick={()=>setShow(!show)} style={{position:'absolute',right:'.75rem',top:'2.1rem',background:'none',border:'none',cursor:'pointer',color:'#9ca3af'}}>
              <Icon name={show?'eye-off':'eye'} style={{width:'18px',height:'18px'}}/>
            </button>
          </div>
          <div style={{display:'flex',gap:'1rem'}}>
            <button onClick={onClose} className="btn btn-secondary" style={{flex:1}}>Cancel</button>
            <button onClick={()=>onLogin(pw)} className="btn btn-primary" style={{flex:1}}>Enter Dashboard</button>
          </div>
          <p style={{textAlign:'center',color:'#9ca3af',fontSize:'.75rem',marginTop:'1rem'}}>
            Access via <code style={{background:'#f3f4f6',padding:'.1rem .3rem',borderRadius:'.25rem'}}>yourpage.html#admin</code> or triple-click the logo
          </p>
        </div>
      </div>
    </div>
  );
}

        </div>
        <div className="modal-body">
          <div style={{display:'grid',gridTemplateColumns:window.innerWidth>600?'1fr 1fr':'1fr',gap:'1.5rem'}}>
            <div>
              <div className="detail-image-wrap">
                <img src={product.image} alt={product.name} className="detail-image"/>
                {product.featured&&<div className="featured-badge">⭐ Featured</div>}

                  <div>
                    <div style={{fontSize:'1.75rem',fontWeight:'700',color:'#059669'}}>{fp(product.price)}</div>
                    <div style={{fontSize:'.875rem',color:'#6b7280',marginTop:'.15rem',fontWeight:'500'}}>{fpAlt(product.price)}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'.375rem',background:'#fef3c7',padding:'.4rem .75rem',borderRadius:'9999px'}}>
                    <Icon name="star" style={{width:'16px',height:'16px',color:'#d97706',fill:'#d97706'}}/>
                    <span style={{fontWeight:'700',color:'#92400e'}}>{product.rating}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:'.75rem',marginTop:'1rem'}}>
                  <button onClick={()=>onAddToCart(product)} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
                    <Icon name="shopping-cart" style={{width:'16px',height:'16px'}}/>Add to Cart
                  </button>
                  <button onClick={()=>onToggleFav(product.id)} style={{padding:'.75rem',background:isFav?'#fee2e2':'white',border:'1px solid #d1d5db',borderRadius:'9999px',cursor:'pointer',transition:'all .2s'}}>
                    <Icon name="heart" style={{width:'18px',height:'18px',color:isFav?'#ef4444':'#6b7280',fill:isFav?'#ef4444':'none'}}/>
                  </button>
                </div>
              </div>
            </div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'1rem'}}>
                <span style={{background:'#ecfdf5',color:'#065f46',border:'1px solid #6ee7b7',padding:'.3rem .875rem',borderRadius:'9999px',fontSize:'.8rem',fontWeight:'600'}}>{product.category}</span>
              </div>
              <div className="detail-section">
                <h4><Icon name="info" style={{width:'16px',height:'16px'}}/>About</h4>
                <p>{product.description}</p>
              </div>
              {product.uses&&(
                <div className="detail-section">
                  <h4><Icon name="flask-conical" style={{width:'16px',height:'16px'}}/>How to Use</h4>
                  <p>{product.uses}</p>
                </div>
              )}
              {diseases.length>0&&(
                <div className="detail-section">
                  <h4><Icon name="heart-pulse" style={{width:'16px',height:'16px'}}/>Conditions It Helps</h4>
                  <div style={{marginTop:'.375rem'}}>
                    {diseases.map((d,i)=><span key={i} className="detail-tag">{d}</span>)}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== PRODUCT CARD =====
function ProductCard({product,onAddToCart,onToggleFav,isFav,delay,fp,fpAlt,onViewProduct}) {
  return (

// ===== NEWSLETTER FORM =====
function NewsletterForm({onSubscribe,onUnsubscribe}) {
  const [email,setEmail] = React.useState('');
  const [mode,setMode] = React.useState('subscribe'); // 'subscribe' | 'unsubscribe'
  const [done,setDone] = React.useState(null); // null | 'subscribed' | 'unsubscribed'
  const [error,setError] = React.useState('');

  const validate = (e) => {
    if(!e.trim()) return 'Email is required';
    if(!e.includes('@')||!e.includes('.')) return 'Enter a valid email address';
    return '';
  };

  const handleSubscribe = () => {
    const err = validate(email);
    if(err){setError(err);return;}
    onSubscribe(email.trim());
    setDone('subscribed');
    setEmail('');
    setTimeout(()=>setDone(null), 4000);
  };

  const handleUnsubscribe = () => {
    const err = validate(email);
    if(err){setError(err);return;}
    onUnsubscribe(email.trim());
    setDone('unsubscribed');
    setEmail('');
    setTimeout(()=>setDone(null), 4000);
  };

  if(done==='subscribed') return (
    <div style={{textAlign:'center',padding:'.5rem 0'}}>
      <p style={{color:'#d1fae5',fontWeight:'700',fontSize:'1.05rem',marginBottom:'.375rem'}}>✓ You're subscribed! Welcome to the community 🌿</p>
      <p style={{color:'#a7f3d0',fontSize:'.85rem'}}>Expect wellness tips and exclusive offers in your inbox.</p>
    </div>
  );
  if(done==='unsubscribed') return (
    <div style={{textAlign:'center',padding:'.5rem 0'}}>
      <p style={{color:'#fca5a5',fontWeight:'700',fontSize:'1.05rem',marginBottom:'.375rem'}}>You've been unsubscribed.</p>
      <p style={{color:'#d1fae5',fontSize:'.85rem'}}>Sorry to see you go. You can re-subscribe anytime.</p>
    </div>
  );

  return (
    <div>
      {/* Mode toggle */}
      <div style={{display:'flex',justifyContent:'center',marginBottom:'1rem'}}>
        <div style={{display:'flex',background:'rgba(255,255,255,.15)',borderRadius:'9999px',padding:'.2rem'}}>
          <button
            onClick={()=>{setMode('subscribe');setError('');}}
            style={{padding:'.4rem 1.25rem',borderRadius:'9999px',border:'none',cursor:'pointer',fontWeight:'600',fontSize:'.82rem',fontFamily:"'Lato',sans-serif",transition:'all .2s',
              background:mode==='subscribe'?'white':'transparent',
              color:mode==='subscribe'?'#059669':'rgba(255,255,255,.8)'
            }}>Subscribe</button>
          <button
            onClick={()=>{setMode('unsubscribe');setError('');}}
            style={{padding:'.4rem 1.25rem',borderRadius:'9999px',border:'none',cursor:'pointer',fontWeight:'600',fontSize:'.82rem',fontFamily:"'Lato',sans-serif",transition:'all .2s',
              background:mode==='unsubscribe'?'white':'transparent',
              color:mode==='unsubscribe'?'#dc2626':'rgba(255,255,255,.8)'
            }}>Unsubscribe</button>
        </div>
      </div>

      <div className="newsletter-form">
        <input
          type="email"
          placeholder={mode==='subscribe'?'your@email.com':'enter your subscribed email'}
          value={email}
          onChange={e=>{setEmail(e.target.value);setError('');}}
          className="newsletter-input"
          onKeyDown={e=>e.key==='Enter'&&(mode==='subscribe'?handleSubscribe():handleUnsubscribe())}
        />
        {mode==='subscribe'
          ? <button onClick={handleSubscribe} className="newsletter-btn">Subscribe</button>
          : <button onClick={handleUnsubscribe} className="newsletter-btn" style={{background:'#dc2626'}}>Unsubscribe</button>
        }
      </div>
      {error&&<p style={{color:'#fca5a5',fontSize:'.8rem',marginTop:'.625rem',textAlign:'center'}}>{error}</p>}
      {mode==='unsubscribe'&&!error&&(
        <p style={{color:'#d1fae5',fontSize:'.78rem',marginTop:'.5rem',textAlign:'center',opacity:.8}}>
          Enter the email you used to subscribe and we'll remove it immediately.
        </p>
      )}
    </div>
  );
}

// ===== VIDEO PLAYER =====
// Click-to-play: shows thumbnail first, injects iframe only on user click.
// Works on any hosted server (http/https). autoplay=1 is honoured because
// the iframe is created synchronously inside the click handler.
function VideoPlayer({video}) {
  const info = extractVideo(video.url);
  const [playing, setPlaying] = React.useState(false);

  if(!info) return (
    <div style={{padding:'2.5rem',textAlign:'center',background:'#f9fafb',borderRadius:'.75rem'}}>
      <Icon name="video-off" style={{width:'40px',height:'40px',color:'#d1d5db',display:'block',margin:'0 auto 1rem'}}/>
      <p style={{color:'#6b7280',marginBottom:'1rem'}}>Unable to recognise this video URL.</p>
      <a href={video.url} target="_blank" rel="noopener noreferrer" className="btn btn-primary" style={{textDecoration:'none',display:'inline-flex'}}>
        <Icon name="external-link" style={{width:'16px',height:'16px'}}/>Open Link
      </a>
    </div>
  );

  if(info.type==='direct') return (
    <div style={{position:'relative',paddingBottom:'56.25%',height:0,borderRadius:'.75rem',overflow:'hidden',background:'#000'}}>
      <video src={info.src} controls autoPlay style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}}/>
    </div>
  );

  const isYT      = info.type==='youtube';
  const platform  = isYT ? 'YouTube' : 'Vimeo';
  const platColor = isYT ? '#dc2626' : '#1ab7ea';
  // Use the embed URL from extractVideo and append autoplay
  const embedSrc  = info.embedUrl + (info.embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';

  if(playing) return (
    <div>
      <div style={{position:'relative',paddingBottom:'56.25%',height:0,borderRadius:'.75rem',overflow:'hidden',background:'#000',boxShadow:'0 4px 24px rgba(0,0,0,.3)'}}>
        <iframe
          src={embedSrc}
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowFullScreen
          style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',border:'none'}}
          title={video.title}
        />
      </div>
      <div style={{display:'flex',justifyContent:'center',marginTop:'.625rem'}}>
        <a href={info.watchUrl} target="_blank" rel="noopener noreferrer"
          style={{fontSize:'.78rem',color:'#9ca3af',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:'.3rem'}}>
          <Icon name="external-link" style={{width:'12px',height:'12px'}}/>Watch on {platform}
        </a>
      </div>
    </div>
  );

  return (
    <div
      onClick={()=>setPlaying(true)}
      style={{position:'relative',paddingBottom:'56.25%',height:0,borderRadius:'.75rem',overflow:'hidden',background:'#111',cursor:'pointer',boxShadow:'0 4px 24px rgba(0,0,0,.35)'}}
    >
      {info.thumb
        ? <img src={info.thumb} alt={video.title} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',objectFit:'cover',opacity:.82}}/>
        : <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,#064e3b,#047857)'}}/>
      }
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 60%)'}}/>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div
          style={{width:'72px',height:'72px',borderRadius:'50%',background:platColor,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 0 8px rgba(255,255,255,.18),0 8px 32px rgba(0,0,0,.5)',transition:'transform .2s'}}
          onMouseOver={e=>e.currentTarget.style.transform='scale(1.1)'}
          onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}
        >
          <Icon name="play" style={{width:'32px',height:'32px',color:'white',fill:'white',marginLeft:'5px'}}/>
        </div>
      </div>
      <div style={{position:'absolute',bottom:'.875rem',left:0,right:0,display:'flex',justifyContent:'center',gap:'.5rem'}}>
        <span style={{background:platColor,color:'white',padding:'.25rem .7rem',borderRadius:'9999px',fontSize:'.7rem',fontWeight:'800'}}>{platform}</span>
        <span style={{background:'rgba(0,0,0,.65)',backdropFilter:'blur(4px)',color:'white',padding:'.25rem .9rem',borderRadius:'9999px',fontSize:'.75rem',fontWeight:'700'}}>▶ Play Video</span>
      </div>
    </div>
  );
}

            </a>
          </div>
        </div>
      )}
      <div style={{position:'relative'}}>
        {!open&&showed&&<div style={{position:'absolute',top:'-2.5rem',right:'0',background:'#064e3b',color:'white',padding:'.4rem .875rem',borderRadius:'9999px',fontSize:'.8rem',fontWeight:'600',whiteSpace:'nowrap',boxShadow:'0 2px 8px rgba(0,0,0,.2)',animation:'fadeInUp .4s ease'}}>Need help? 🌿</div>}
        <button className="chat-btn" onClick={()=>setOpen(!open)}>
          <Icon name={open?'x':'message-circle'} style={{width:'26px',height:'26px',color:'white'}}/>
        </button>
      </div>
    </div>
  );
}

// ===== NEWSLETTER COMPOSER =====
function NewsletterComposer({subscribers, settings, showToast}) {
  const ak = settings?.apiKeys || {};
  const anthropicKey  = ak.anthropicKey  || '';
  const ejsServiceId  = ak.ejsServiceId  || '';
  const ejsTemplateId = ak.ejsTemplateId || '';
  const ejsPublicKey  = ak.ejsPublicKey  || '';
  const ejsReady = ejsServiceId && ejsTemplateId && ejsPublicKey;

  const [subject,   setSubject]   = React.useState('');
  const [body,      setBody]      = React.useState('');
  const [preview,   setPreview]   = React.useState(false);
  const [aiTopic,   setAiTopic]   = React.useState('');
  const [aiLoading, setAiLoading] = React.useState(false);
  const [sending,   setSending]   = React.useState(false);
  const [sentCount, setSentCount] = React.useState(0);
  const [sendDone,  setSendDone]  = React.useState(false);
  const [templateMode, setTemplateMode] = React.useState(false);

  const emails = subscribers.map(s => s.email);
  const count  = emails.length;

  // Init EmailJS whenever public key changes
  React.useEffect(() => {
    if(ejsPublicKey && window.emailjs) window.emailjs.init({publicKey: ejsPublicKey});
  }, [ejsPublicKey]);

  const copyEmails = () => {
    navigator.clipboard.writeText(emails.join(', '));
    showToast(`${count} email${count!==1?'s':''} copied!`);
  };

  // Build a personalised one-click unsubscribe URL — always uses remedybloomy.xo.je
  const makeUnsubLink = (email) => {
    try {
      const u = new URL(window.SITE_URL);
      const binId = window.CloudSync.getBinId();
      if (binId) u.searchParams.set('bin', binId);
      u.searchParams.set('unsubscribe', btoa(email));
      return u.toString();
    } catch(_){ return window.SITE_URL + '?unsubscribe=' + btoa(email); }
  };

  // Append unsubscribe footer to body for a specific recipient
  const withUnsub = (emailBody, recipientEmail) => {
    const link = makeUnsubLink(recipientEmail);
    return emailBody.trimEnd() + `

---
To unsubscribe from future emails, click here:
${link}`;
  };

  // Free email templates
  const templates = {
    wellness: {
      subject: '🌿 This Week\'s Wellness Tips from RemedyBloomy',
      body: `We hope you're enjoying great health!\n\nThis week we're excited to share some of our favorite wellness tips with you.\n\n✨ Benefits of incorporating natural remedies into your daily routine:\n• Improved overall wellness\n• Better sleep quality  \n• Natural energy boost\n• Supports immune health\n\nDiscover our latest products and exclusive subscriber offers below!\n\nWarm regards,\nRemedyBloomy Team\nhttps://remedybloomy.com`
    },
    featured: {
      subject: '✨ Featured: Our Best-Selling Natural Remedies',
      body: `Hello Wellness Enthusiast,\n\nWe wanted to share some of our most beloved products that are making a real difference for our community.\n\n⭐ Top picks this month:\n• Premium Essential Oils\n• Herbal Tea Collections\n• Natural Skincare Range\n\nEach product is carefully sourced for quality and purity. Subscribers enjoy exclusive discounts!\n\nExplore now and transform your wellness journey.\n\nBest wishes,\nRemedyBloomy Team\nhttps://remedybloomy.com`
    },
    seasonal: {
      subject: '🍂 Seasonal Wellness Guide for Better Health',
      body: `Dear RemedyBloomy Community,\n\nAs the seasons change, so do our wellness needs. We've curated a special collection for this season.\n\n🌟 Our recommendations:\n• Immune-supporting blends\n• Seasonal essential oils\n• Transitional wellness packages\n\nTake advantage of limited-time offers exclusive to our newsletter subscribers!\n\nHere's to vibrant health,\nRemedyBloomy Team\nhttps://remedybloomy.com`
    },
    announcement: {
      subject: '📢 Important Update from RemedyBloomy',
      body: `Hello valued subscriber,\n\nWe're thrilled to announce some exciting updates to our RemedyBloomy family!\n\n🎉 What's new:\n• New product launches\n• Enhanced service offerings\n• Community initiatives\n\nStay tuned for more information. We appreciate your continued trust and support.\n\nThank you,\nRemedyBloomy Team\nhttps://remedybloomy.com`
    }
  };

  const applyTemplate = (key) => {
    const t = templates[key];
    setSubject(t.subject);
    setBody(t.body);
    setTemplateMode(false);
    showToast('Template applied! You can customize it further.');
  };

  // ── AI generation via Anthropic API ──
  const generateWithAI = async () => {
    if(!aiTopic.trim()){ showToast('Enter a topic first.'); return; }
    if(!anthropicKey){ showToast('Add your Anthropic API key in Settings → API Keys first.'); return; }
    setAiLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 900,
          messages: [{
            role: 'user',
            content: `You are a wellness email copywriter for RemedyBloomy natural remedies store.
Write a newsletter email about: "${aiTopic}".
Reply with ONLY a raw JSON object, no markdown, no explanation:
{"subject":"catchy subject with emoji","body":"email body starting with We hope you're enjoying great health!\\n\\n and ending with \\n\\nWarm regards,\\nRemedyBloomy Team\\nhttps://remedybloomy.com\\n\\n---\\nTo unsubscribe from future emails, click the personal unsubscribe link included in your copy of this email. — max 200 words"}`
          }]
        })
      });
      if(!res.ok) { const err=await res.json(); throw new Error(err.error?.message||res.status); }
      const data  = await res.json();
      const raw   = (data.content||[]).map(c=>c.text||'').join('').trim();
      const clean = raw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
      const parsed = JSON.parse(clean);
      if(parsed.subject) setSubject(parsed.subject);
      if(parsed.body)    setBody(parsed.body);
      showToast('✨ AI draft ready! Customize and send.');
    } catch(e) {
      showToast('AI failed: ' + (e.message||'check your API key in Settings → API Keys'));
    }
    setAiLoading(false);
  };

  // ── Send via EmailJS (one per subscriber) or Gmail fallback ──
  const handleSend = async () => {
    if(!count)                        { showToast('No subscribers yet!'); return; }
    if(!subject.trim()||!body.trim()) { showToast('Fill in subject and message.'); return; }
    if(!ejsReady) {
      navigator.clipboard.writeText(emails.join(', ')).catch(()=>{});
      // Gmail BCC can't personalise, so add a generic unsubscribe instruction
      const unsubInstructions = `\n\n---\nTo unsubscribe, visit: ${window.SITE_URL} and use the Unsubscribe option in the newsletter section, or reply with "unsubscribe" in the subject.`;
      const gmailBody = body.trimEnd() + unsubInstructions;
      const url = `https://mail.google.com/mail/?view=cm&bcc=${encodeURIComponent(emails.join(','))}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(gmailBody)}`;
      window.open(url, '_blank');
      showToast('📧 Gmail opened — subscriber emails copied, paste into BCC');
      return;
    }
    setSending(true); setSentCount(0);
    let ok = 0;
    for(const email of emails) {
      try {
        await window.emailjs.send(ejsServiceId, ejsTemplateId, {
          to_email:  email,
          subject:   subject,
          message:   withUnsub(body, email),
          from_name: 'RemedyBloomy'
        });
        ok++;
        setSentCount(ok);
      } catch(err) { console.warn('EmailJS failed for', email, err); }
    }
    setSending(false);
    setSendDone(true);
    showToast(ok > 0 ? `✅ Sent to ${ok} subscriber${ok!==1?'s':''}!` : 'Send failed — check EmailJS settings.');
  };

  const reset = () => { setSubject(''); setBody(''); setAiTopic(''); setPreview(false); setSendDone(false); setSentCount(0); };

  if(sending) return (
    <div className="settings-card" style={{textAlign:'center',padding:'3rem 2rem'}}>
      <div style={{width:'60px',height:'60px',border:'5px solid #e5e7eb',borderTop:'5px solid #059669',borderRadius:'50%',margin:'0 auto 1.5rem',animation:'spin .9s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.6rem',color:'#064e3b',marginBottom:'.5rem'}}>Sending newsletters…</h3>
      <p style={{color:'#6b7280'}}>{sentCount} of {count} delivered</p>
      <div style={{marginTop:'1rem',background:'#e5e7eb',borderRadius:'9999px',height:'6px',overflow:'hidden',maxWidth:'260px',margin:'1rem auto 0'}}>
        <div style={{height:'100%',background:'#059669',borderRadius:'9999px',width:`${Math.round((sentCount/count)*100)}%`,transition:'width .4s'}}/>
      </div>
    </div>
  );

  if(sendDone) return (
    <div className="settings-card" style={{textAlign:'center',padding:'3rem 2rem'}}>
      <div style={{width:'72px',height:'72px',borderRadius:'50%',background:'linear-gradient(135deg,#047857,#059669)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.25rem',boxShadow:'0 8px 32px rgba(5,150,105,.3)'}}>
        <Icon name="check" style={{width:'36px',height:'36px',color:'white'}}/>
      </div>
      <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.8rem',color:'#064e3b',marginBottom:'.375rem'}}>Newsletter Sent! 🌿</h3>
      <p style={{color:'#6b7280',marginBottom:'1.5rem'}}>Delivered to <strong style={{color:'#059669'}}>{sentCount}</strong> subscriber{sentCount!==1?'s':''}.</p>
      <button onClick={reset} className="btn btn-primary"><Icon name="plus" style={{width:'16px',height:'16px'}}/>Compose Another</button>
    </div>
  );

  return (
    <div className="settings-card" style={{marginBottom:'1.5rem'}}>
      <h3 style={{marginBottom:'1rem'}}><Icon name="send" style={{width:'18px',height:'18px'}}/>Compose & Send Newsletter</h3>

      {/* Config status banners */}
      {(!anthropicKey || !ejsReady) && (
        <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'.75rem',padding:'1rem 1.25rem',marginBottom:'1.25rem'}}>
          <p style={{fontWeight:'700',color:'#92400e',fontSize:'.875rem',marginBottom:'.375rem',display:'flex',alignItems:'center',gap:'.375rem'}}>
            <Icon name="settings" style={{width:'14px',height:'14px'}}/>Setup options in Settings → API Keys
          </p>
          <ul style={{color:'#78350f',fontSize:'.8rem',lineHeight:'1.8',paddingLeft:'1.1rem',margin:0}}>
            {!anthropicKey && <li><strong>Anthropic API Key</strong> — enables AI newsletter drafting (optional, use templates instead)</li>}
            {!ejsReady     && <li><strong>EmailJS credentials</strong> — enables direct sending. Without it, you'll use Gmail compose.</li>}
          </ul>
        </div>
      )}

      {/* Subscriber count */}
      {count===0 ? (
        <div style={{background:'#fef3c7',borderRadius:'.75rem',padding:'1rem 1.25rem',display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.25rem'}}>
          <Icon name="alert-circle" style={{width:'20px',height:'20px',color:'#d97706',flexShrink:0}}/>
          <p style={{color:'#92400e',fontSize:'.875rem'}}>No subscribers yet — share your newsletter signup link to get started!</p>
        </div>
      ) : (
        <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'.75rem',padding:'1rem 1.25rem',display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.25rem',flexWrap:'wrap'}}>
          <Icon name="users" style={{width:'20px',height:'20px',color:'#059669',flexShrink:0}}/>
          <p style={{color:'#065f46',fontSize:'.875rem',fontWeight:'600',flex:1}}>{count} subscriber{count!==1?'s':''} will receive this newsletter.</p>
          <button onClick={copyEmails} style={{background:'none',border:'1px solid #059669',color:'#059669',borderRadius:'9999px',padding:'.25rem .75rem',fontSize:'.75rem',fontWeight:'700',cursor:'pointer',whiteSpace:'nowrap'}}>Copy Emails</button>
        </div>
      )}

      {/* Template Quick Actions */}
      <div style={{background:'#f0f9f6',border:'1px solid #bbf7d0',borderRadius:'.75rem',padding:'1rem 1.25rem',marginBottom:'1.25rem'}}>
        <p style={{fontSize:'.8rem',fontWeight:'700',color:'#065f46',marginBottom:'.75rem',display:'flex',alignItems:'center',gap:'.375rem'}}>
          <Icon name="layout-template" style={{width:'14px',height:'14px'}}/>Quick Templates
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'.5rem'}}>
          {Object.keys(templates).map(key=>(
            <button key={key} onClick={()=>applyTemplate(key)} 
              style={{padding:'.5rem .75rem',background:'white',border:'1px solid #d1d5db',borderRadius:'.5rem',fontSize:'.75rem',fontWeight:'600',cursor:'pointer',color:'#059669',transition:'all .2s'}}
              onMouseOver={e=>e.target.style.background='#f0fdf4'}
              onMouseOut={e=>e.target.style.background='white'}>
              {key.charAt(0).toUpperCase()+key.slice(1)}
            </button>
          ))}
        </div>
      </div>

      {/* AI writer */}
      <div style={{background:'linear-gradient(135deg,#f0fdf4,#fef9c3)',border:'1px solid #bbf7d0',borderRadius:'.75rem',padding:'1rem 1.25rem',marginBottom:'1.25rem'}}>
        <p style={{fontSize:'.8rem',fontWeight:'700',color:'#065f46',marginBottom:'.625rem',display:'flex',alignItems:'center',gap:'.375rem'}}>
          <Icon name="sparkles" style={{width:'14px',height:'14px',color:'#059669'}}/>AI Newsletter Writer {!anthropicKey&&<span style={{fontWeight:'400',color:'#d97706'}}>(add API key in Settings to enable)</span>}
        </p>
        <div style={{display:'flex',gap:'.625rem',flexWrap:'wrap'}}>
          <input type="text" value={aiTopic} onChange={e=>setAiTopic(e.target.value)}
            placeholder="e.g., lavender oil, activated charcoal, immune boosting…"
            className="form-input" style={{flex:1,minWidth:'180px',marginBottom:0}}
            onKeyDown={e=>e.key==='Enter'&&generateWithAI()}/>
          <button onClick={generateWithAI} disabled={aiLoading||!anthropicKey} className="btn btn-primary"
            style={{whiteSpace:'nowrap',opacity:(aiLoading||!anthropicKey)?.6:1}}>
            {aiLoading ? <><Icon name="loader" style={{width:'14px',height:'14px'}}/>Writing…</> : <><Icon name="sparkles" style={{width:'14px',height:'14px'}}/>Generate</>}
          </button>
        </div>
      </div>

      {/* Subject */}
      <div className="form-group">
        <label className="form-label">Subject Line</label>
        <input type="text" value={subject} onChange={e=>setSubject(e.target.value)} className="form-input" placeholder="🌿 This Week's Wellness Tips from RemedyBloomy"/>
      </div>

      {/* Body */}
      <div className="form-group" style={{marginBottom:'1.25rem'}}>
        <label className="form-label">Message Body</label>
        <textarea value={body} onChange={e=>setBody(e.target.value)} className="form-textarea" rows="10"
          placeholder={`We hope you're enjoying great health!\n\nThis week we're sharing...\n\nWarm regards,\nRemedyBloomy Team\nhttps://remedybloomy.com`}/>
      </div>

      {/* Preview */}
      {body&&(
        <div style={{marginBottom:'1.25rem'}}>
          <button onClick={()=>setPreview(!preview)} style={{background:'none',border:'none',cursor:'pointer',color:'#059669',fontSize:'.85rem',fontWeight:'600',display:'flex',alignItems:'center',gap:'.375rem',padding:0}}>
            <Icon name={preview?'eye-off':'eye'} style={{width:'15px',height:'15px'}}/>{preview?'Hide':'Show'} Email Preview
          </button>
          {preview&&(
            <div style={{marginTop:'1rem',border:'2px solid #e5e7eb',borderRadius:'.75rem',overflow:'hidden',background:'white'}}>
              <div style={{background:'#064e3b',color:'white',padding:'1rem 1.25rem',fontSize:'.8rem',fontWeight:'600'}}><strong>Subject:</strong> {subject||'(no subject)'}</div>
              <div style={{padding:'1.75rem',fontFamily:'Georgia,serif',fontSize:'.95rem',lineHeight:'1.8',color:'#1f2937',whiteSpace:'pre-wrap',maxHeight:'320px',overflowY:'auto'}}>{body}</div>
              <div style={{background:'#f9fafb',padding:'1rem 1.25rem',fontSize:'.75rem',color:'#6b7280',borderTop:'1px solid #e5e7eb',display:'flex',alignItems:'center',gap:'.5rem'}}>
                <Icon name="users" style={{width:'14px',height:'14px'}}/>To {count} subscriber{count!==1?'s':''}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Unsubscribe notice */}
      {(subject||body)&&(
        <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'.75rem',padding:'.75rem 1rem',marginBottom:'1rem',display:'flex',gap:'.625rem',alignItems:'flex-start'}}>
          <Icon name="link" style={{width:'15px',height:'15px',color:'#059669',flexShrink:0,marginTop:'2px'}}/>
          <p style={{fontSize:'.78rem',color:'#065f46',lineHeight:'1.5',margin:0}}>
            <strong>Unsubscribe link auto-added.</strong> Each recipient's copy will include a personalised one-click unsubscribe link at the bottom. Clicking it instantly removes them from your list.
          </p>
        </div>
      )}
      {/* Send */}
      <button onClick={handleSend} className="btn btn-primary"
        disabled={!subject.trim()||!body.trim()||!count}
        style={{opacity:(!subject.trim()||!body.trim()||!count)?.4:1,cursor:(!subject.trim()||!body.trim()||!count)?'not-allowed':'pointer',fontSize:'1rem',padding:'.875rem 2rem',width:'100%'}}>
        <Icon name="send" style={{width:'18px',height:'18px'}}/>
        {ejsReady ? `Send to ${count} Subscriber${count!==1?'s':''}` : `Open Gmail for ${count} Subscriber${count!==1?'s':''}`}
      </button>
      {!ejsReady&&count>0&&subject&&body&&(
        <p style={{fontSize:'.76rem',color:'#6b7280',marginTop:'.5rem',textAlign:'center'}}>💡 Add EmailJS credentials in Settings to send directly without Gmail.</p>
      )}
    </div>
  );
}

// ===== SETTINGS TAB (per-section save) =====
function SaveBtn({onClick,saved}) {
  return (
    <button onClick={onClick} className="btn btn-primary" style={{fontSize:'.85rem',padding:'.6rem 1.25rem',marginTop:'1rem'}}>
      {saved
        ? <><Icon name="check" style={{width:'15px',height:'15px'}}/>Saved!</>
        : <><Icon name="save" style={{width:'15px',height:'15px'}}/>Save Changes</>}
    </button>
  );
}

function useSectionSave(initial,onSave) {
  const [draft,setDraft] = React.useState(initial);
  const [saved,setSaved] = React.useState(false);
  const update = (k,v) => setDraft(d=>({...d,[k]:v}));
  const save = () => { onSave(draft); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  return {draft,update,save,saved};
}

function SettingsTab({settings,onSave,showToast}) {
  // ── Currency (immediate toggle, no draft needed) ──
  const [currency,setCurrency] = React.useState(settings.currency);
  const [currSaved,setCurrSaved] = React.useState(false);
  const saveCurrency = (c) => { setCurrency(c); onSave('currency',c); setCurrSaved(true); setTimeout(()=>setCurrSaved(false),2000); };

  // ── Payment link ──
  const pay = useSectionSave({paymentLink:settings.paymentLink}, d=>onSave('paymentLink',d.paymentLink));

  // ── Contact ──
  const contact = useSectionSave({...settings.contact}, d=>onSave('contact',d));

  // ── Social ──
  const social = useSectionSave({...settings.social}, d=>onSave('social',d));

  // ── Newsletter ──
  const nl = useSectionSave({...settings.newsletter}, d=>onSave('newsletter',d));

  // ── Chat ──
  const chat = useSectionSave({...settings.chat}, d=>onSave('chat',d));

  // ── API Keys ──
  const apiK = useSectionSave({...settings.apiKeys}, d=>onSave('apiKeys',d));

  // ── Cloud Sync state ──
  const [binId, setBinId]         = React.useState(window.CloudSync.getBinId() || '');
  const [binIdInput, setBinIdInput] = React.useState('');
  const [activating, setActivating] = React.useState(false);
  const [binCopied, setBinCopied] = React.useState(false);
  const hardcoded = window.CloudSync.isHardcoded();

  const copyBinId = () => {
    const id = window.CloudSync.getBinId();
    if (!id) return;
    navigator.clipboard.writeText(id).catch(()=>{
      const ta=document.createElement('textarea'); ta.value=id;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    setBinCopied(true); setTimeout(()=>setBinCopied(false),2500);
  };

  const activateFromCode = () => {
    const id = binIdInput.trim();
    if (!id || id.length < 10) { showToast('Paste a valid Sync Code first.'); return; }
    localStorage.setItem('rb_cloud_bin_id', id);
    showToast('✅ Sync Code saved! Reloading to fetch your data…');
    setBinId(id);
    setBinIdInput('');
    // Short delay so toast is visible, then reload to pull cloud data
    setTimeout(() => window.location.reload(), 1200);
  };

  const activateNew = async () => {
    setActivating(true);
    showToast('Creating cloud storage… this takes a few seconds.');
    // Trigger a save which will create the bin
    onSave('currency', settings.currency);
    // Poll until bin is created (save is async)
    let tries = 0;
    const poll = setInterval(()=>{
      const id = window.CloudSync.getBinId();
      if (id || tries++ > 10) {
        clearInterval(poll);
        setActivating(false);
        if (id) { setBinId(id); showToast('☁️ Cloud sync activated! Copy your Sync Code below.'); }
        else showToast('Could not create cloud storage. Check your internet connection.');
      }
    }, 800);
  };

  return (
    <div style={{maxWidth:'48rem'}}>
      <div className="admin-header"><h3 className="font-display" style={{fontSize:'1.4rem',fontWeight:'700',color:'#064e3b'}}>Store Settings</h3></div>

      {/* Cloud Sync */}
      <div className="settings-card" style={{background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',border:'1.5px solid #6ee7b7'}}>
        <h3><Icon name="cloud" style={{width:'16px',height:'16px'}}/>☁️ Cross-Browser Sync</h3>

        {!binId && !hardcoded ? (
          /* ── Not yet set up ── */
          <div>
            <p style={{color:'#374151',fontSize:'.875rem',marginBottom:'1.25rem',lineHeight:'1.7'}}>
              Your settings are currently saved <strong>only in this browser</strong>. Activate cloud sync so that opening <strong>https://remedybloomy.xo.je/</strong> on any browser or device always loads your latest admin settings automatically — no special URL needed.
            </p>
            <div style={{display:'grid',gap:'1rem'}}>
              {/* Option A: Already have a Sync Code */}
              <div style={{background:'white',border:'1px solid #d1d5db',borderRadius:'.875rem',padding:'1.125rem 1.25rem'}}>
                <p style={{fontWeight:'700',color:'#064e3b',fontSize:'.9rem',marginBottom:'.625rem',display:'flex',alignItems:'center',gap:'.4rem'}}>
                  <Icon name="key" style={{width:'15px',height:'15px',color:'#059669'}}/>Already have a Sync Code?
                </p>
                <div style={{display:'flex',gap:'.625rem',flexWrap:'wrap'}}>
                  <input
                    type="text" value={binIdInput} onChange={e=>setBinIdInput(e.target.value)}
                    placeholder="Paste your Sync Code here…"
                    className="form-input" style={{flex:1,marginBottom:0,fontFamily:'monospace',fontSize:'.85rem'}}
                  />
                  <button onClick={activateFromCode} className="btn btn-primary" style={{whiteSpace:'nowrap',fontSize:'.85rem'}}>
                    <Icon name="check" style={{width:'14px',height:'14px'}}/>Apply &amp; Reload
                  </button>
                </div>
              </div>
              {/* Option B: First time — create new */}
              <div style={{background:'white',border:'1px solid #d1d5db',borderRadius:'.875rem',padding:'1.125rem 1.25rem'}}>
                <p style={{fontWeight:'700',color:'#064e3b',fontSize:'.9rem',marginBottom:'.5rem',display:'flex',alignItems:'center',gap:'.4rem'}}>
                  <Icon name="plus-circle" style={{width:'15px',height:'15px',color:'#059669'}}/>First time? Create new cloud storage
                </p>
                <p style={{fontSize:'.8rem',color:'#6b7280',marginBottom:'.75rem',lineHeight:'1.6'}}>This creates a free permanent cloud bin. You'll get a Sync Code to save — paste it into any other browser to connect.</p>
                <button onClick={activateNew} disabled={activating} className="btn btn-primary"
                  style={{opacity:activating?.6:1,cursor:activating?'not-allowed':'pointer'}}>
                  {activating
                    ? <><Icon name="loader" style={{width:'15px',height:'15px'}}/>Creating…</>
                    : <><Icon name="cloud" style={{width:'15px',height:'15px'}}/>Activate Cloud Sync</>}
                </button>
              </div>
            </div>
          </div>
        ) : (
          /* ── Already active ── */
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'.625rem',marginBottom:'1rem'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'50%',background:'#059669',flexShrink:0}}/>
              <span style={{color:'#065f46',fontWeight:'700',fontSize:'.9rem'}}>Cloud sync active</span>
              {hardcoded && <span style={{fontSize:'.75rem',background:'#dcfce7',color:'#166534',padding:'.15rem .6rem',borderRadius:'9999px',fontWeight:'600'}}>Permanent</span>}
            </div>
            <p style={{color:'#374151',fontSize:'.875rem',marginBottom:'1rem',lineHeight:'1.7'}}>
              Your store data syncs to the cloud on every save. Opening <strong>https://remedybloomy.xo.je/</strong> on any browser loads your latest settings automatically — as long as you have the Sync Code entered in that browser at least once.
            </p>
            <div style={{background:'white',border:'1px solid #d1d5db',borderRadius:'.875rem',padding:'1rem 1.25rem',marginBottom:'1rem'}}>
              <p style={{fontSize:'.8rem',fontWeight:'700',color:'#374151',marginBottom:'.625rem'}}>Your Sync Code <span style={{fontWeight:'400',color:'#9ca3af'}}>(save this somewhere safe)</span></p>
              <div style={{display:'flex',gap:'.625rem',alignItems:'center',flexWrap:'wrap'}}>
                <code style={{flex:1,background:'#f3f4f6',padding:'.5rem .875rem',borderRadius:'.5rem',fontSize:'.82rem',color:'#064e3b',wordBreak:'break-all'}}>{binId}</code>
                <button onClick={copyBinId} className="btn btn-secondary" style={{whiteSpace:'nowrap',fontSize:'.82rem',padding:'.5rem 1rem'}}>
                  {binCopied ? <><Icon name="check" style={{width:'13px',height:'13px'}}/>Copied!</> : <><Icon name="copy" style={{width:'13px',height:'13px'}}/>Copy</>}
                </button>
              </div>
            </div>
            <div style={{background:'#fef9c3',border:'1px solid #fde68a',borderRadius:'.75rem',padding:'.875rem 1rem'}}>
              <p style={{fontSize:'.8rem',color:'#92400e',lineHeight:'1.6',margin:0}}>
                <strong>Using a new browser?</strong> Open Admin → Settings and paste this Sync Code into the "Already have a Sync Code?" box. You only need to do this once per browser.
              </p>
            </div>
          </div>
        )}
      </div>

      {/* Currency */}
      <div className="settings-card">
        <h3><Icon name="coins" style={{width:'16px',height:'16px'}}/>Currency Display</h3>
        <p style={{color:'#6b7280',fontSize:'.875rem',marginBottom:'1rem'}}>Choose which currency is shown <strong>first</strong> on the store. Both USD and KES are always displayed together on every product card and detail view.</p>
        <div style={{display:'flex',alignItems:'center',gap:'1.25rem',flexWrap:'wrap',marginBottom:'.75rem'}}>
          <div className="currency-toggle">
            <button className={`currency-option ${currency==='USD'?'active':''}`} onClick={()=>setCurrency('USD')}>$ USD first</button>
            <button className={`currency-option ${currency==='KES'?'active':''}`} onClick={()=>setCurrency('KES')}>KES first</button>
          </div>

// ===== ADMIN PASSWORD CHANGE =====
function AdminPasswordChange({current,onChange,showToast}) {
  const [cur,setCur] = React.useState('');
  const [nw,setNw] = React.useState('');
  const [conf,setConf] = React.useState('');
  const save = () => {
    if(cur!==current){showToast('Current password is incorrect');return;}
    if(nw.length<6){showToast('New password must be at least 6 characters');return;}
    if(nw!==conf){showToast('Passwords do not match');return;}
    onChange(nw); setCur(''); setNw(''); setConf(''); showToast('Password updated successfully');
  };
  return (
    <div style={{display:'grid',gap:'.75rem'}}>
      {[['Current Password',cur,setCur],['New Password',nw,setNw],['Confirm New Password',conf,setConf]].map(([l,v,sv])=>(
        <div key={l}>
          <label className="form-label">{l}</label>
          <input type="password" value={v} onChange={e=>sv(e.target.value)} className="form-input" placeholder="••••••••"/>
        </div>
      ))}
      <button onClick={save} className="btn btn-primary" style={{width:'fit-content'}}><Icon name="save" style={{width:'16px',height:'16px'}}/>Save Password</button>
    </div>
  );
}

// ===== PRODUCT FORM =====
function ProductForm({product,categories,onSave,onCancel}) {
  const [f,setF] = React.useState({

    featured:product?.featured||false,rating:product?.rating||4.5
  });
  const submit = e => { e.preventDefault(); onSave({...f,price:parseFloat(f.price),rating:parseFloat(f.rating)}); };
  return (
    <div className="modal-overlay">
      <div className="modal-backdrop" onClick={onCancel}/>
      <div className="modal-content scrollbar-hide">
        <div className="modal-header">
          <h2 className="modal-title">{product?'Edit Product':'Add Product'}</h2>
          <button onClick={onCancel} style={{background:'none',border:'none',padding:'.5rem',cursor:'pointer'}}><Icon name="x" style={{width:'22px',height:'22px'}}/></button>
        </div>
        <form onSubmit={submit} className="modal-body">

            <div className="form-group"><label className="form-label">Price (USD)</label><input type="number" required step="0.01" min="0" value={f.price} onChange={e=>setF({...f,price:e.target.value})} className="form-input" placeholder="24.99"/></div>
            <div className="form-group"><label className="form-label">Rating (0–5)</label><input type="number" required step="0.1" min="0" max="5" value={f.rating} onChange={e=>setF({...f,rating:e.target.value})} className="form-input" placeholder="4.8"/></div>

          <div className="form-group"><label className="form-label">Description</label><textarea required value={f.description} onChange={e=>setF({...f,description:e.target.value})} rows="2" className="form-textarea" placeholder="Short product description..."/></div>

          <div className="form-checkbox-group"><input type="checkbox" id="feat" checked={f.featured} onChange={e=>setF({...f,featured:e.target.checked})} className="form-checkbox"/><label htmlFor="feat" className="form-checkbox-label">Mark as Featured Product</label></div>

  );
